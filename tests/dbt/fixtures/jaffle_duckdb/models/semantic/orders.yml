version: 2

semantic_models:
  - name: orders
    description: Order fact, one row per placed order.
    model: ref('stg_orders')
    defaults:
      agg_time_dimension: ordered_at
    entities:
      - name: order_id
        type: primary
      - name: customer
        type: foreign
        expr: customer_id
    dimensions:
      - name: ordered_at
        description: The date the order was placed.
        type: time
        expr: cast(order_date as date)
        type_params:
          time_granularity: day
      - name: is_large_order
        description: Whether the order total is at least 50.
        type: categorical
        expr: amount >= 50
    measures:
      - name: order_total
        description: Total order amount.
        agg: sum
        expr: amount
      - name: order_count
        description: Number of orders.
        agg: sum
        expr: "1"

metrics:
  - name: revenue
    description: Sum of order amounts.
    type: simple
    label: Revenue
    type_params:
      measure: order_total
  - name: order_count
    description: Count of orders.
    type: simple
    label: Orders
    type_params:
      measure: order_count
  - name: average_order_value
    description: Revenue per order.
    type: ratio
    label: Average order value
    type_params:
      numerator: revenue
      denominator: order_count
  - name: revenue_doubled
    description: Revenue multiplied by two, as a derived-metric example.
    type: derived
    label: Revenue doubled
    type_params:
      expr: revenue * 2
      metrics:
        - name: revenue
