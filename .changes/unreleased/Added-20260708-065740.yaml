kind: Added
body: 'Snowflake Cortex Analyst solver: evaluate a deployed Cortex Analyst through the usual scoring cascade. `CortexAnalystSolver` sends a natural-language question to the Cortex Analyst REST endpoint (reusing your Snowflake connection''s session token) and returns the SQL it generates, which evaldata runs and scores against a gold query. Install the `cortex` extra.'
