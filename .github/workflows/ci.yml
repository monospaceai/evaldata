name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  UV_FROZEN: "1"

jobs:
  # Does anything outside the docs need the test suite? Docs-only PRs (Markdown + the mkdocs
  # config) skip the heavy gate/compat jobs; the cheap docs build still runs. Pushes always run
  # the suite, so `main` stays fully gated regardless of what changed.
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.detect.outputs.code }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed="$(git diff --name-only "$BASE_SHA...$HEAD_SHA" 2>/dev/null || true)"
          echo "changed files:"
          echo "$changed"
          # code unless every changed file is a doc (Markdown anywhere, or mkdocs.yml). An empty
          # or failed diff falls through to code=true, so detection problems never skip the suite.
          if [ -z "$changed" ] || printf '%s\n' "$changed" | grep -qvE '^(docs/|mkdocs\.yml$)|\.md$'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  # Strict docs build: fails on broken references or snippet includes. Cheap (no services, no
  # model), so it runs on every PR — including docs-only ones, where it's the only real check.
  docs:
    name: docs (strict build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: "3.13"
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
      - name: Build docs
        run: just docs-build

  # Full gate: the suite (unit + e2e + Databricks cloud) at the latest Python, with the coverage
  # gate and build. Snowflake cloud is excluded here — it authenticates via OIDC bound to the main
  # branch, so it runs in its own main-only `snowflake` job. Cloud secrets aren't available to fork
  # PRs, so the gate is skipped there and `check` treats that as OK. Skipped on docs-only PRs.
  gate:
    name: gate (py3.13)
    needs: changes
    if: (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository) && needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: "3.13"
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh
      - name: Cache the Ollama model
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.ollama/models
          key: ollama-qwen2.5-coder-1.5b
      - name: Serve Ollama, pull model, run the full gate
        run: |
          sudo systemctl stop ollama 2>/dev/null || true
          nohup ollama serve > /tmp/ollama.log 2>&1 &
          for _ in $(seq 1 30); do
            curl -sf http://localhost:11434/api/tags >/dev/null && break
            sleep 1
          done
          ollama pull qwen2.5-coder:1.5b
          # Snowflake cloud is excluded (OIDC is main-only); it runs in the `snowflake` job.
          # The live Cortex e2e is excluded too (it consumes credits); it runs off the PR path.
          just lint
          just typecheck
          just test-cov '-m "not snowflake and not cortex"'
          just build
        env:
          EVALDATA_LOCAL_MODEL: ollama_chat/qwen2.5-coder:1.5b
          DATABRICKS_SERVER_HOSTNAME: ${{ secrets.DATABRICKS_SERVER_HOSTNAME }}
          DATABRICKS_HTTP_PATH: ${{ secrets.DATABRICKS_HTTP_PATH }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

  # Compatibility: the non-cloud suite on the other supported Pythons (3.13 is the gate's). No
  # secrets, so it runs on fork PRs too.
  compat:
    name: compat (py${{ matrix.python-version }})
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh
      - name: Cache the Ollama model
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.ollama/models
          key: ollama-qwen2.5-coder-1.5b
      - name: Serve Ollama, pull model, run the non-cloud suite
        run: |
          sudo systemctl stop ollama 2>/dev/null || true
          nohup ollama serve > /tmp/ollama.log 2>&1 &
          for _ in $(seq 1 30); do
            curl -sf http://localhost:11434/api/tags >/dev/null && break
            sleep 1
          done
          ollama pull qwen2.5-coder:1.5b
          just check-nocloud
        env:
          EVALDATA_LOCAL_MODEL: ollama_chat/qwen2.5-coder:1.5b

  # Snowflake cloud e2e, secret-free via GitHub Actions OIDC (workload identity federation). The
  # service user's trust is bound to the main-branch OIDC subject, so this runs on push to main
  # only — which also gates Snowflake credit spend to merges rather than every PR.
  snowflake:
    name: snowflake (cloud, main only)
    needs: changes
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: "3.13"
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
      - name: Run the Snowflake cloud tests
        run: |
          # Mint a GitHub OIDC token for Snowflake; the id-token permission provides these vars.
          SNOWFLAKE_TOKEN="$(curl -sSf \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=snowflakecomputing.com" | jq -r '.value')"
          export SNOWFLAKE_TOKEN
          just test '-m snowflake'
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_WAREHOUSE: COMPUTE_WH
          SNOWFLAKE_AUTHENTICATOR: WORKLOAD_IDENTITY
          SNOWFLAKE_WORKLOAD_IDENTITY_PROVIDER: OIDC

  # Single required status check for branch protection. `changes` and `docs` must pass. `gate`,
  # `compat`, and `snowflake` may be skipped — a fork-skipped `gate`, a docs-only PR, or the
  # push-to-main-only `snowflake` on a PR — but a real failure of any is not OK.
  check:
    if: always()
    needs: [changes, docs, gate, compat, snowflake]
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "changes result: ${{ needs.changes.result }}"
            exit 1
          fi
          if [ "${{ needs.docs.result }}" != "success" ]; then
            echo "docs result: ${{ needs.docs.result }}"
            exit 1
          fi
          if [ "${{ needs.gate.result }}" != "success" ] && [ "${{ needs.gate.result }}" != "skipped" ]; then
            echo "gate result: ${{ needs.gate.result }}"
            exit 1
          fi
          if [ "${{ needs.compat.result }}" != "success" ] && [ "${{ needs.compat.result }}" != "skipped" ]; then
            echo "compat result: ${{ needs.compat.result }}"
            exit 1
          fi
          if [ "${{ needs.snowflake.result }}" != "success" ] && [ "${{ needs.snowflake.result }}" != "skipped" ]; then
            echo "snowflake result: ${{ needs.snowflake.result }}"
            exit 1
          fi
