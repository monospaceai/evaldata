name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  UV_FROZEN: "1"

jobs:
  # Does anything outside the docs need the test suite? Docs-only changes (Markdown + the mkdocs
  # config) skip the heavy gate/compat jobs; the cheap docs build still runs.
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.detect.outputs.code }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            changed="$(git diff --name-only "$BASE_SHA...$HEAD_SHA" 2>/dev/null || true)"
          elif [ -z "$BEFORE_SHA" ] || echo "$BEFORE_SHA" | grep -qE '^0+$'; then
            changed=""
          else
            changed="$(git diff --name-only "$BEFORE_SHA..$CURRENT_SHA" 2>/dev/null || true)"
          fi
          echo "changed files:"
          echo "$changed"
          # code unless every changed file is a doc (Markdown anywhere, or mkdocs.yml). Example
          # code is executable and should run the suite when it changes. An empty
          # or failed diff falls through to code=true, so detection problems never skip the suite.
          if [ -z "$changed" ] || printf '%s\n' "$changed" | grep -qvE '^(docs/|mkdocs\.yml$)|\.md$'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  # Strict docs build: fails on broken references or snippet includes. Cheap (no services, no
  # model), so it runs on every PR — including docs-only ones, where it's the only real check.
  docs:
    name: docs (strict build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: "3.13"
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
      - name: Build docs
        run: just docs-build

  # Full gate: the non-cloud suite (unit + local e2e) at the latest Python, with the 100% coverage
  # gate and build. Needs no secrets, so it runs on fork PRs too. Skipped on docs-only PRs.
  gate:
    name: gate (py3.13)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: "3.13"
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
      - name: Install Ollama
        # Pinned so runs are reproducible; bump deliberately.
        run: curl -fsSL https://ollama.com/install.sh | OLLAMA_VERSION=0.31.1 sh
      - name: Cache the Ollama model
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.ollama/models
          key: ollama-qwen2.5-coder-1.5b
      - name: Serve Ollama, pull model, run the full gate
        run: |
          sudo systemctl stop ollama 2>/dev/null || true
          grep -m1 'model name' /proc/cpuinfo; grep -om1 ' avx512[a-z]*' /proc/cpuinfo || echo 'no avx512'
          nohup ollama serve > /tmp/ollama.log 2>&1 &
          for _ in $(seq 1 30); do
            curl -sf http://localhost:11434/api/tags >/dev/null && break
            sleep 1
          done
          ollama pull qwen2.5-coder:1.5b
          just check
          just build
        env:
          EVALDATA_LOCAL_MODEL: ollama_chat/qwen2.5-coder:1.5b
          # llama.cpp's AMX repack path segfaults at model load on the fleet's Emerald Rapids machines.
          LLAMA_ARG_NO_REPACK: "1"
      - name: Upload the Ollama server log
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ollama-log-gate
          path: /tmp/ollama.log

  # Databricks cloud e2e, split from the gate because it needs secrets, which fork PRs can't receive.
  cloud:
    name: cloud (databricks)
    needs: changes
    if: >-
      (github.event_name == 'push'
       || (github.event_name == 'pull_request'
           && github.event.pull_request.head.repo.full_name == github.repository))
      && needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: "3.13"
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
      - name: Run the Databricks cloud tests
        run: just test-databricks
        env:
          DATABRICKS_SERVER_HOSTNAME: ${{ secrets.DATABRICKS_SERVER_HOSTNAME }}
          DATABRICKS_HTTP_PATH: ${{ secrets.DATABRICKS_HTTP_PATH }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

  # Compatibility: the non-cloud suite on the other supported Pythons (3.13 is the gate's). No
  # secrets, so it runs on fork PRs too.
  compat:
    name: compat (py${{ matrix.python-version }})
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
      - name: Install Ollama
        # Pinned so runs are reproducible; bump deliberately.
        run: curl -fsSL https://ollama.com/install.sh | OLLAMA_VERSION=0.31.1 sh
      - name: Cache the Ollama model
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.ollama/models
          key: ollama-qwen2.5-coder-1.5b
      - name: Serve Ollama, pull model, run the non-cloud suite
        run: |
          sudo systemctl stop ollama 2>/dev/null || true
          grep -m1 'model name' /proc/cpuinfo; grep -om1 ' avx512[a-z]*' /proc/cpuinfo || echo 'no avx512'
          nohup ollama serve > /tmp/ollama.log 2>&1 &
          for _ in $(seq 1 30); do
            curl -sf http://localhost:11434/api/tags >/dev/null && break
            sleep 1
          done
          ollama pull qwen2.5-coder:1.5b
          just check-nocloud
        env:
          EVALDATA_LOCAL_MODEL: ollama_chat/qwen2.5-coder:1.5b
          # llama.cpp's AMX repack path segfaults at model load on the fleet's Emerald Rapids machines.
          LLAMA_ARG_NO_REPACK: "1"
      - name: Upload the Ollama server log
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ollama-log-compat-${{ matrix.python-version }}
          path: /tmp/ollama.log

  # Snowflake cloud e2e via GitHub OIDC. Fork PRs can't mint the token.
  snowflake:
    name: snowflake (cloud)
    needs: changes
    if: >-
      ((github.event_name == 'push'
           && github.ref == 'refs/heads/main')
       || (github.event_name == 'pull_request'
           && github.event.pull_request.head.repo.full_name == github.repository))
      && needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: "3.13"
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
      - name: Run the Snowflake cloud tests
        run: |
          # Mint a GitHub OIDC token for Snowflake; the id-token permission provides these vars.
          SNOWFLAKE_TOKEN="$(curl -sSf \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=snowflakecomputing.com" | jq -r '.value')"
          export SNOWFLAKE_TOKEN
          just test-snowflake
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_WAREHOUSE: COMPUTE_WH
          # The CI role can create tables in this namespace but not databases.
          SNOWFLAKE_DATABASE: EVALDATA_CI
          SNOWFLAKE_SCHEMA: PUBLIC
          SNOWFLAKE_AUTHENTICATOR: WORKLOAD_IDENTITY
          SNOWFLAKE_WORKLOAD_IDENTITY_PROVIDER: OIDC

  # BigQuery cloud e2e via GitHub Workload Identity Federation. Fork PRs can't mint the token.
  bigquery:
    name: bigquery (cloud)
    needs: changes
    if: >-
      ((github.event_name == 'push'
           && github.ref == 'refs/heads/main')
       || (github.event_name == 'pull_request'
           && github.event.pull_request.head.repo.full_name == github.repository))
      && needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: "3.13"
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
      - name: Authenticate to Google Cloud
        # Exchanges the GitHub OIDC token for GCP credentials and exports ADC automatically.
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - name: Run the BigQuery cloud tests
        run: just test-bigquery
        env:
          BIGQUERY_PROJECT: ${{ secrets.BIGQUERY_PROJECT }}
          BIGQUERY_DATASET: evaldata_ci

  # Single required status check: requires success from every job expected to run for this event,
  # so a should-have-run job that was skipped fails instead of passing silently.
  check:
    if: always()
    needs: [changes, docs, gate, cloud, compat, snowflake, bigquery]
    runs-on: ubuntu-latest
    env:
      CODE: ${{ needs.changes.outputs.code }}
      IS_PUSH: ${{ github.event_name == 'push' }}
      IS_MAIN_PUSH: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      IS_SAME_REPO_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
      CHANGES_RESULT: ${{ needs.changes.result }}
      DOCS_RESULT: ${{ needs.docs.result }}
      GATE_RESULT: ${{ needs.gate.result }}
      CLOUD_RESULT: ${{ needs.cloud.result }}
      COMPAT_RESULT: ${{ needs.compat.result }}
      SNOWFLAKE_RESULT: ${{ needs.snowflake.result }}
      BIGQUERY_RESULT: ${{ needs.bigquery.result }}
    steps:
      - run: |
          fail=0
          require_success() { # name result — must have run and passed
            if [ "$2" != "success" ]; then
              echo "::error::$1 was expected to run but its result was: $2"
              fail=1
            fi
          }
          allow_skip() { # name result — may be skipped, but never a real failure
            if [ "$2" != "success" ] && [ "$2" != "skipped" ]; then
              echo "::error::$1 result was: $2"
              fail=1
            fi
          }

          require_success changes "$CHANGES_RESULT"
          require_success docs "$DOCS_RESULT"

          if [ "$CODE" = "true" ]; then
            require_success gate "$GATE_RESULT"
            require_success compat "$COMPAT_RESULT"
          else
            allow_skip gate "$GATE_RESULT"
            allow_skip compat "$COMPAT_RESULT"
          fi

          if [ "$CODE" = "true" ] && { [ "$IS_PUSH" = "true" ] || [ "$IS_SAME_REPO_PR" = "true" ]; }; then
            require_success cloud "$CLOUD_RESULT"
          else
            allow_skip cloud "$CLOUD_RESULT"
          fi

          if [ "$CODE" = "true" ] && { [ "$IS_MAIN_PUSH" = "true" ] || [ "$IS_SAME_REPO_PR" = "true" ]; }; then
            require_success snowflake "$SNOWFLAKE_RESULT"
          else
            allow_skip snowflake "$SNOWFLAKE_RESULT"
          fi

          if [ "$CODE" = "true" ] && { [ "$IS_MAIN_PUSH" = "true" ] || [ "$IS_SAME_REPO_PR" = "true" ]; }; then
            require_success bigquery "$BIGQUERY_RESULT"
          else
            allow_skip bigquery "$BIGQUERY_RESULT"
          fi

          exit $fail
