site_name: evaldata
site_description: AI evals framework for data & analytics engineering teams.
site_url: https://monospaceai.github.io/evaldata/
repo_url: https://github.com/monospaceai/evaldata
repo_name: monospaceai/evaldata
copyright: Copyright &copy; monospaceai

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            show_source: false
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            merge_init_into_class: true
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css

extra:
  version:
    provider: mike
    alias: true

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Guides:
      - Evaluate a local Ollama model: guides/local-ollama.md
      - Evaluate a hosted model: guides/hosted-model.md
      - Evaluate against Databricks: guides/databricks.md
      - Evaluate against a dbt project: guides/dbt.md
      - Evaluate dbt Semantic Layer queries: guides/dbt-semantic-layer.md
      - Reproduce dbt's Semantic Layer benchmark: guides/dbt-semantic-layer-benchmark.md
      - Check semantic equivalence: guides/semantic-equivalence.md
      - Score with an LLM judge: guides/llm-judge.md
      - Run a text-to-SQL benchmark: guides/benchmarks.md
  - Concepts: concepts.md
  - API reference:
      - reference/index.md
      - Evals & cases: reference/eval.md
      - Types: reference/types.md
      - Scorers: reference/scorers.md
      - Solvers: reference/solvers.md
      - LLM: reference/llm.md
      - Equivalence: reference/equivalence.md
      - Platforms: reference/platforms.md
      - dbt: reference/dbt.md
