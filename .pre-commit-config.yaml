# Fast checks only. Type-checking and the full test suite run in CI.
default_language_version:
  python: python3.11

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=2000"]
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: debug-statements

  - repo: local
    hooks:
      - id: ruff
        name: ruff (just fix)
        entry: just fix
        language: system
        types_or: [python, pyi]
        pass_filenames: false
      - id: scan-cassettes
        name: scan vcr cassettes for leaked credentials
        entry: python scripts/scan_cassettes.py
        language: system
        files: cassettes/.*\.(yaml|yml)$

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.9.7
    hooks:
      - id: uv-lock

  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.21
    hooks:
      - id: validate-pyproject

# No `ty` pre-commit hook yet (2026-05): too slow for a commit hook. Typecheck runs in CI
# via `just typecheck` (--all-extras so optional adapter drivers resolve).
